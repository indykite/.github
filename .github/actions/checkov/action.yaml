---
#
# DO NOT EDIT!!!
# Managed by GitHub Actions
#
name: checkov
description: Runs Checkov IaC security scanner

runs:
  using: composite
  steps:
    - name: actions/git-checkout
      uses: indykite/.github/.github/actions/git-checkout@master # actions/checkout with dynamic fetch-depth resolution

    - name: detect checkov config
      id: checkov_config
      shell: bash
      run: |
        config_path=""
        if [[ -f ".checkov.yml" ]]; then
          config_path=".checkov.yml"
        elif [[ -f ".checkov.yaml" ]]; then
          config_path=".checkov.yaml"
        fi

        if [[ -n "${config_path}" ]]; then
          echo "path=${config_path}" >> "${GITHUB_OUTPUT}"
          echo "Detected Checkov config file: ${config_path}"
        else
          echo "No Checkov config file found (.checkov.ya?ml); Checkov step will be skipped."
        fi

    - name: checkov
      if: steps.checkov_config.outputs.path
      uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12.3114.0 - https://github.com/bridgecrewio/checkov-action/releases
      with:
        config_file: ${{ steps.checkov_config.outputs.path }}
        output_format: cli
