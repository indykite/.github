---
#
# DO NOT EDIT!!!
# Managed by GitHub Actions
#
name: terraform-validate
description: Runs Terraform validate across directories and modules

inputs:
  tf_plugin_cache_dir:
    description: Terraform plugin cache dir, shared across all module inits
    default: "~/.terraform.d/plugin-cache"
    required: false
  changed_only:
    description: Validate only modules containing changed Terraform files
    default: "false"
    required: false
  exclude_dirs:
    description: Comma-separated directory names/paths to exclude from validation
    default: ""
    required: false
  exclude_file:
    description: Optional file with exclude entries (one per line, # comments allowed)
    default: ".terraform-validate-ignore"
    required: false
  github_token:
    description: GitHub token used to rewrite SSH module sources to HTTPS for tofu init
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: actions/git-checkout
      uses: indykite/.github/.github/actions/git-checkout@master # actions/checkout with dynamic fetch-depth resolution
      id: checkout

    - name: dorny/paths-filter
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1 - https://github.com/dorny/paths-filter/releases
      id: filter-paths
      if: inputs.changed_only == 'true'
      with:
        initial-fetch-depth: ${{ steps.checkout.outputs.fetch-depth }}
        list-files: shell
        predicate-quantifier: every
        filters: |
          terraform:
            - '**/*.tf'
            - '!**/.terraform/**'
            - '!**/.terragrunt-cache/**'

    - name: filter/process-terraform-files
      id: filter
      shell: bash
      env:
        HAS_TERRAFORM_CHANGES: ${{ steps.filter-paths.outputs.terraform || 'false' }} # fallback to 'false' if the filter output doesn't run
      run: |
        if [[ "${HAS_TERRAFORM_CHANGES}" == 'true' ]] || [[ ${{ inputs.changed_only }} != 'true' ]] ; then
          echo "enabled=true" >> "${GITHUB_OUTPUT}"
        else
          echo "enabled=false" >> "${GITHUB_OUTPUT}"
          echo "[INFO] no Terraform files found, skipping..."
        fi

    - name: setup/opentofu
      uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2 - https://github.com/opentofu/setup-opentofu/releases
      if: steps.filter.outputs.enabled == 'true'

    - name: resolve/cache-dir
      id: cache-dir
      if: steps.filter.outputs.enabled == 'true'
      shell: bash
      run: |
        dir='${{ inputs.tf_plugin_cache_dir }}'
        if [[ "${dir}" == ~* ]]; then
          dir="${HOME}${dir:1}"
        fi
        mkdir -p "${dir}"
        echo "path=${dir}" >> "${GITHUB_OUTPUT}"

    - name: get/cache-week
      id: cache-week
      if: steps.filter.outputs.enabled == 'true'
      shell: bash
      run: |
        echo "year_week=$(date +'%G%V')" >> "${GITHUB_OUTPUT}"

    # Cache the shared Terraform/OpenTofu provider plugin directory.
    # Use ISO year+week key for predictable rotation and stable cache restore/save behavior.
    - name: cache/tf-plugins
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 - https://github.com/actions/cache/releases
      id: tf-cache
      if: steps.filter.outputs.enabled == 'true'
      with:
        path: ${{ steps.cache-dir.outputs.path }}
        key: cache-tf-plugins-v2-${{ runner.os }}-${{ steps.cache-week.outputs.year_week }}

    - name: terraform-validate
      if: steps.filter.outputs.enabled == 'true'
      id: terraform-validate
      shell: bash
      env:
        INPUT_CHANGED_ONLY: ${{ inputs.changed_only }}
        INPUT_CHANGED_FILES: ${{ steps.filter-paths.outputs.terraform_files }}
        INPUT_EXCLUDE_DIRS: ${{ inputs.exclude_dirs }}
        INPUT_EXCLUDE_FILE: ${{ inputs.exclude_file }}
        TF_PLUGIN_CACHE_DIR: ${{ steps.cache-dir.outputs.path }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        AWS_DEFAULT_REGION: us-east-1 # default region for AWS provider validation paths, in case if needed by providers
      run: |-
        bash "${GITHUB_ACTION_PATH}/tf_validate.sh"

    - name: actions/upload-artifact/terraform-validate-log
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1 - https://github.com/actions/upload-artifact/releases
      if: always() && steps.filter.outputs.enabled == 'true' && hashFiles(steps.terraform-validate.outputs.full_log_gz_path) != ''
      with:
        name: terraform-validate-log-${{ github.run_id }}-${{ github.run_attempt }}
        path: ${{ steps.terraform-validate.outputs.full_log_gz_path }}
        retention-days: ${{ github.retention_days }}
        if-no-files-found: error
