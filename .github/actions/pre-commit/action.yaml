---
#
# DO NOT EDIT!!!
# Managed by GitHub Actions
#
name: pre-commit
description: re-usable 'pre-commit' Github Action for formatting and linting

inputs:
  action_timeout:
    description: Allowed time for action execution in minutes
    required: false
    default: "10"
  github_token:
    description: Github PAT
    required: false
    default: ""
  checkout_fetch_master:
    description: Whether to fetch 'origin/master', requires for certain checks, controlled via env.GH_CHECKOUT_FETCH_MASTER
    default: "0"
    required: false
  pre_commit_skip:
    description: Any steps to skip, useful for "heavy" or completed parallel tests, i.e. golang, commitlint
    default: ""
    required: false
  tf_plugin_cache_dir:
    description: Terraform plugin cache dir, replacement for action-wide env var. Normally, do not need to be updated
    default: "~/.terraform.d/plugin-cache"
    required: false
  trivy_cache_dir:
    description: Trivy DB cache dir, replacement for action-wide env var. Normally, do not need to be updated
    default: "~/.cache/trivy"
    required: false

runs:
  using: composite
  steps:
    - name: actions/git-checkout
      uses: indykite/.github/.github/actions/git-checkout@master # actions/checkout with dynamic fetch-depth resolution
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    - name: actions/checkout/fetch ${{ github.base_ref }}
      if: inputs.checkout_fetch_master == '1'
      shell: bash
      run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

    - name: setup/env
      id: action-prep
      shell: bash
      run: |
        _CONFIG=".pre-commit-config.yaml"

        # required for support of utility repos with non-root 'go.mod' location
        FILE=$(find . -name go.mod | head -n 1)

        # Detect Node package manager cache strategy from lockfile presence.
        # Supports non-root lockfile/package.json locations.
        NODE_PM=""
        NODE_PM_LOCKFILE=""
        NODE_PM_WORKDIR="."
        NODE_VERSION_FILE=""
        PNPM_VERSION="latest"
        LOCKFILE_PNPM=$(find . -type f -name 'pnpm-lock.yaml' -not -path '*/node_modules/*' | sort | head -n 1)
        LOCKFILE_NPM=$(
          find . -type f \( -name 'package-lock.json' -o -name 'npm-shrinkwrap.json' \) \
            -not -path '*/node_modules/*' | sort | head -n 1
        )
        LOCKFILE_YARN=$(find . -type f -name 'yarn.lock' -not -path '*/node_modules/*' | sort | head -n 1)

        # Priority: pnpm, npm, yarn.
        LOCKFILE=""
        if [[ -n "${LOCKFILE_PNPM}" ]]; then
          NODE_PM="pnpm"
          LOCKFILE="${LOCKFILE_PNPM}"
        elif [[ -n "${LOCKFILE_NPM}" ]]; then
          NODE_PM="npm"
          LOCKFILE="${LOCKFILE_NPM}"
        elif [[ -n "${LOCKFILE_YARN}" ]]; then
          NODE_PM="yarn"
          LOCKFILE="${LOCKFILE_YARN}"
        fi

        if [[ -n "${LOCKFILE}" ]]; then
          NODE_PM_LOCKFILE="${LOCKFILE#./}"
          NODE_PM_WORKDIR="$(dirname "${NODE_PM_LOCKFILE}")"
        fi

        if [[ -f "${NODE_PM_WORKDIR}/package.json" ]]; then
          NODE_VERSION_FILE="${NODE_PM_WORKDIR}/package.json"
        elif [[ -f "package.json" ]]; then
          NODE_VERSION_FILE="package.json"
        fi

        if [[ -n "${NODE_VERSION_FILE}" ]]; then
          PACKAGE_MANAGER=$(
            python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("packageManager", ""))' \
              "${NODE_VERSION_FILE}" 2>/dev/null || true
          )
          if [[ "$PACKAGE_MANAGER" == pnpm@* ]]; then
            PNPM_VERSION="${PACKAGE_MANAGER#pnpm@}"
          fi
        fi

        set -x
        if [[ ! -f "${_CONFIG}" ]]; then
          echo "[INFO] ${_CONFIG} not found, skipping pre-commit action setup."
            echo "PRE_COMMIT_RUN=0" >>"$GITHUB_OUTPUT"
        else
          # Avoid pipefail-induced exits when there are no node-related hooks in config.
          IS_NPM_MATCHES=$(grep -Ec "(npm|node)" "$_CONFIG" || true)
          IS_NODE_LANGUAGE_MATCHES=$(grep -Ec "language: node" "$_CONFIG" || true)
          IS_NPM=$((IS_NPM_MATCHES - IS_NODE_LANGUAGE_MATCHES))
          if [[ "$IS_NPM" -gt 0 && -z "$NODE_PM" ]]; then
            echo "[ERROR] Node hooks detected in ${_CONFIG}, but no supported lockfile found."
            echo "[ERROR] Expected one of: pnpm-lock.yaml, package-lock.json, npm-shrinkwrap.json, yarn.lock (at repo root or nested)."
            exit 1
          fi

          {
            echo "PRE_COMMIT_RUN=1"
            echo "IS_TERRAFORM=$(grep -c "terraform" "$_CONFIG")"
            echo "IS_GOLANG=${IS_GOLANG:-$(grep -E "\<(go|golang)\>" "$_CONFIG" | grep -vEc "(language: go|gone|- repo)")}"
            echo "IS_NPM=$IS_NPM"
            echo "NODE_PM=$NODE_PM"
            echo "NODE_PM_LOCKFILE=$NODE_PM_LOCKFILE"
            echo "NODE_PM_WORKDIR=$NODE_PM_WORKDIR"
            echo "NODE_VERSION_FILE=$NODE_VERSION_FILE"
            echo "PNPM_VERSION=$PNPM_VERSION"
            echo "gomod_path=$FILE"
            echo "CACHE_MONTH=$(date +'%Y%m')"
          } >>"$GITHUB_OUTPUT"
        fi

    # Must run BEFORE cache/restore so the resolved Python patch version can key the cache.
    # Otherwise a runner-image Python patch bump (e.g. 3.14.3 -> 3.14.4) leaves pre-commit
    # venvs in ~/.cache/pre-commit with shebangs pointing at a Python binary that no longer
    # exists in /opt/hostedtoolcache, breaking every cached hook.
    - name: setup/python3
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0 - https://github.com/actions/setup-python/releases
      if: steps.action-prep.outputs.PRE_COMMIT_RUN == '1'
      with:
        # cache: 'pip' # dependent on **/requirements.txt or **/pyproject.toml
        python-version: "3.14"

    - name: setup/python3/version
      id: pyver
      shell: bash
      if: steps.action-prep.outputs.PRE_COMMIT_RUN == '1'
      run: |
        v=$(python3 -c 'import sys;print(".".join(map(str,sys.version_info[:3])))')
        echo "v=${v}" >>"$GITHUB_OUTPUT"

    - name: actions/cache/restore
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 - https://github.com/actions/cache/releases
      id: cache
      if: steps.action-prep.outputs.PRE_COMMIT_RUN == '1'
      with:
        lookup-only: ${{ github.event_name != 'pull_request' }} # don't download on 'master'; if missing, will be saved anyway
        path: |
          /home/linuxbrew/.linuxbrew
          ~/.cache
          ${{ inputs.trivy_cache_dir }}
          ${{ inputs.tf_plugin_cache_dir }}
        # expire cache monthly, so CLI tools can be kept updated - "a cache today is immutable and cannot be updated"
        # https://github.com/actions/cache/blob/main/tips-and-workarounds.md#update-a-cache
        key: >-
          key: ${{ runner.os }}-pre-commit-py${{ steps.pyver.outputs.v }}-${{
          hashFiles('./.pre-commit-config.y*', format('{0}/.pkg_map.rc', github.action_path) )
          }}-state-${{ steps.action-prep.outputs.CACHE_MONTH }}

    - name: setup/opentofu
      uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2 - https://github.com/opentofu/setup-opentofu/releases
      if: >-
        steps.action-prep.outputs.PRE_COMMIT_RUN == '1'
        && steps.action-prep.outputs.IS_TERRAFORM > 0
        && ((github.event_name != 'pull_request' && !steps.cache.outputs.cache-hit) || github.event_name == 'pull_request')

    - name: setup/golang
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0 - https://github.com/actions/setup-go/releases
      with:
        go-version-file: ${{ steps.action-prep.outputs.gomod_path }}
        cache-dependency-path: "**/go.sum"
      if: >-
        steps.action-prep.outputs.PRE_COMMIT_RUN == '1'
        && steps.action-prep.outputs.IS_GOLANG > 0
        && steps.action-prep.outputs.gomod_path != ''
        && ((github.event_name != 'pull_request' && !steps.cache.outputs.cache-hit) || github.event_name == 'pull_request')

    - name: setup/pnpm
      uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9 - https://github.com/pnpm/action-setup/releases
      if: >-
        steps.action-prep.outputs.PRE_COMMIT_RUN == '1'
        && steps.action-prep.outputs.IS_NPM > 0
        && steps.action-prep.outputs.NODE_PM == 'pnpm'
        && ((github.event_name != 'pull_request' && !steps.cache.outputs.cache-hit) || github.event_name == 'pull_request')
      with:
        version: ${{ steps.action-prep.outputs.PNPM_VERSION }}
        cache: true
        cache_dependency_path: ${{ steps.action-prep.outputs.NODE_PM_LOCKFILE }}

    - name: setup/node
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0 - https://github.com/actions/setup-node/releases
      with:
        node-version-file: ${{ steps.action-prep.outputs.NODE_VERSION_FILE }}
        cache: ${{ steps.action-prep.outputs.NODE_PM }}
        cache-dependency-path: ${{ steps.action-prep.outputs.NODE_PM_LOCKFILE }}
      if: >-
        steps.action-prep.outputs.PRE_COMMIT_RUN == '1'
        && steps.action-prep.outputs.IS_NPM > 0
        && ((github.event_name != 'pull_request' && !steps.cache.outputs.cache-hit) || github.event_name == 'pull_request')

    #
    # prepare env
    - name: setup/pre-commit
      # if cache is present, no need to re-run on 'master'
      if: >-
        steps.action-prep.outputs.PRE_COMMIT_RUN == '1'
        && ((github.event_name != 'pull_request' && !steps.cache.outputs.cache-hit) || github.event_name == 'pull_request')
      shell: bash
      env:
        IS_CACHE: ${{ steps.cache.outputs.cache-hit }}
        IS_DEBUG: ${{ runner.debug }} # set only if debug logging is enabled, and always has the value of 1
        IS_GOLANG: ${{ steps.action-prep.outputs.IS_GOLANG }}
        IS_NPM: ${{ steps.action-prep.outputs.IS_NPM }}
        NODE_PM: ${{ steps.action-prep.outputs.NODE_PM }}
        NODE_PM_WORKDIR: ${{ steps.action-prep.outputs.NODE_PM_WORKDIR }}
        NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }} # normally empty, but required FontAwesome Pro packages
        GITHUB_TOKEN: ${{ inputs.github_token }}
        TG_PROVIDER_CACHE: 1
        TG_PROVIDER_CACHE_DIR: ${{ inputs.tf_plugin_cache_dir }}
        TF_PLUGIN_CACHE_DIR: ${{ inputs.tf_plugin_cache_dir }}
        TRIVY_CACHE_DIR: ${{ inputs.trivy_cache_dir }}
      run: |-
        # setup/pre-commit
        timeout ${{ inputs.action_timeout }}m $GITHUB_ACTION_PATH/script.sh

    # save early, so if pre-commit fails, the cache with prerequisites is available
    - name: actions/cache/save
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 - https://github.com/actions/cache/releases
      if: steps.action-prep.outputs.PRE_COMMIT_RUN == '1' && (!steps.cache.outputs.cache-hit)
      with:
        path: |
          /home/linuxbrew/.linuxbrew
          ~/.cache
          ${{ inputs.trivy_cache_dir }}
          ${{ inputs.tf_plugin_cache_dir }}
        key: >-
          key: ${{ runner.os }}-pre-commit-py${{ steps.pyver.outputs.v }}-${{
          hashFiles('./.pre-commit-config.y*', format('{0}/.pkg_map.rc', github.action_path) )
          }}-state-${{ steps.action-prep.outputs.CACHE_MONTH }}

    #
    # execute pre-commit checks
    - name: pre-commit checks
      # run actual checks against PR only
      if: steps.action-prep.outputs.PRE_COMMIT_RUN == '1' && github.event_name == 'pull_request'
      shell: bash
      env:
        IS_DEBUG: ${{ runner.debug }} # set only if debug logging is enabled, and always has the value of 1
        PRE_COMMIT_SKIP: ${{ inputs.pre_commit_skip }}
        TG_PROVIDER_CACHE: 1
        TG_PROVIDER_CACHE_DIR: ${{ inputs.tf_plugin_cache_dir }}
        TF_PLUGIN_CACHE_DIR: ${{ inputs.tf_plugin_cache_dir }}
        TRIVY_CACHE_DIR: ${{ inputs.trivy_cache_dir }}
      run: |-
        # run/pre-commit
        PRE_COMMIT_ARGS=("--all-files" "--show-diff-on-failure" "--color=always" "--hook-stage" "pre-commit")
        if [[ ${IS_DEBUG} == "1" ]]; then
            PRE_COMMIT_ARGS+=("--verbose")
        fi

        # sanitize PRE_COMMIT_SKIP, remove any spaces
        SKIP="${PRE_COMMIT_SKIP// /}" time python -m pre_commit run --config .pre-commit-config-ci.yaml "${PRE_COMMIT_ARGS[@]}"
